<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vite + React + TS</title>
  
  <!-- I added -->
  <title>Form</title>
  
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.js"></script>
  
  <!-- I added -->
  <h2>Create new habit</h2>
  <form id ="habitForm">
    
    <!-- Text Input -->
     <label for ="habitName">Habit Name:</label>
     <input type ="text" id ="habitName" name ="habitName" required>

    <!-- Select dropdown -->
     <label for ="category">Category:</label>
     <select id="category" name="category">
      <option value="health">Health</option>
      <option value="productivity">Productivity</option>
      <option value="learning">Learning</option>
     </select>

    <!-- Radio Buttons -->
     <fieldset>
      <legend>Frequency:</legend>
      <input type="radio" id="daily" name="frequency" value="daily" checked>
      <label for="daily">Daily</label>

      <input type="radio" id="weekly" name="frequency" value="weekly" checked>
      <label for="weekly">Weekly</label>
     </fieldset>

    <!-- Checkbox -->
     <input type="checkbox" id="reminder" name="reminder">
     <label for="reminder">Enable reminders</label>

    <!-- Buttons -->
     <button type="submit">Create Habit</button>
     <button type="reset">Clear Form</button>

  </form>
</body>
</html>
